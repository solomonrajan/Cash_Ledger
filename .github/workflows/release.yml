name: Build and Release APKs

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"

      - name: Create missing files for build
        run: |
          if [ ! -f "debug.keystore" ]; then
            echo "Generating debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          if [ ! -f "app/google-services.json" ]; then
            echo "Generating mock google-services.json..."
            echo '{"project_info": {"project_number": "123","firebase_url": "https://mock.firebaseio.com","project_id": "mock","storage_bucket": "mock.appspot.com"},"client": [{"client_info": {"mobilesdk_app_id": "1:123:android:123","android_client_info": {"package_name": "com.aistudio.expensetracker.paisa"}},"oauth_client": [],"api_key": [{"current_key": "mock"}],"services": {"appinvite_service": {"other_platform_oauth_client": []}}}]}' > app/google-services.json
          fi

      - name: Build APKs
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
            export KEYSTORE_PATH=$(pwd)/my-upload-key.jks
            gradle assembleRelease
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
          else
            echo "No keystore secret found, building Debug APK instead..."
            gradle assembleDebug
            echo "BUILD_TYPE=debug" >> $GITHUB_ENV
          fi

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v000.01"
          name: "Alpha Build v000.01"
          body_path: CHANGELOG.md
          generate_release_notes: false
          make_latest: true
          files: |
            app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
