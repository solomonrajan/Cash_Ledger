name: Build and Release APKs

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build APKs
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
            export KEYSTORE_PATH=$(pwd)/my-upload-key.jks
            gradle assembleRelease
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
          else
            echo "No keystore secret found, building Debug APK instead..."
            gradle assembleDebug
            echo "BUILD_TYPE=debug" >> $GITHUB_ENV
          fi

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "commit-${{ steps.vars.outputs.sha_short }}"
          name: "Build-${{ steps.vars.outputs.sha_short }}"
          body: "Automated build for commit ${{ steps.vars.outputs.sha_short }}"
          files: |
            app/build/outputs/apk/${{ env.BUILD_TYPE }}/app-armeabi-v7a-${{ env.BUILD_TYPE }}.apk
            app/build/outputs/apk/${{ env.BUILD_TYPE }}/app-arm64-v8a-${{ env.BUILD_TYPE }}.apk
            app/build/outputs/apk/${{ env.BUILD_TYPE }}/app-universal-${{ env.BUILD_TYPE }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
